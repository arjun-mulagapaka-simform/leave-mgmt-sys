{% extends 'frontend/index.html' %}

{% load static %}
{% load crispy_forms_tags %}

{% block title %}
    Login Page
{% endblock title %}

{% block content %}
    <form class="login-form" method="POST" onSubmit="login(event)">
        {% csrf_token %}
        {% crispy form %}
        <input type="submit" class="btn btn-primary" value="Login">
        <div id="login-errors"></div>
    </form>
{% endblock content %}
